<body>
    <header>
        <nav>
            <div class="logo">
                <img src="images/logo.png" alt="شعار معجنات وفطائر">
                <h1>معجنات وفطائر</h1>
            </div>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="about.html">من نحن</a></li>

                <span></span>

            </div>
        </nav>
    </header>

    <main>
        <section class="order-section">
            <h2>نموذج الطلب</h2>
            <form id="order-form">
                <div class="form-group">
                    <label for="name">الاسم الكامل:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="phone">رقم الهاتف:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="product">نوع المنتج:</label>
                    <select id="product" name="product" required>
                        <option value="">اختر منتجًا</option>
                        <option value="فطيرة الجبن">فطيرة الجبن - 0.500 ريال</option>
                        <option value="فطيرة الزعتر">فطيرة الزعتر - 0.400 ريال</option>
                        <option value="ميني بيتزا">ميني بيتزا - 0.600 ريال</option>
                        <option value="كرواسون شوكولاتة">كرواسون شوكولاتة - 0.700 ريال</option>
                        <option value="فطيرة لحم">فطيرة لحم - 0.800 ريال</option>
                        <option value="فطيرة دجاج">فطيرة دجاج - 0.900 ريال</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">الكمية:</label>
                    <input type="number" id="quantity" name="quantity" min="1" value="1" required>
                </div>
                <button type="submit" class="btn">إرسال الطلب</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>جميع الحقوق محفوظة لمخبز معجنات وفطائر © <span id="year"></span></p>
            <div class="social">
                <a href="https://www.instagram.com/m_bakery01" target="_blank">إنستقرام</a>
                <a href="tel:+96871718944">+968 7171 8944</a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
